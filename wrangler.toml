# Cloudflare Pages — static Next.js site (`output: "export"` writes to ./out)
#
# Use Pages + static export, NOT `wrangler deploy` (Workers / OpenNext).
# After `npm run build`, deploy with:
#   npx wrangler pages deploy
#
# Or set your CI “deploy command” to that (build command stays `npm run build`).

name = "travel-with-moiz"
compatibility_date = "2025-05-01"
pages_build_output_dir = "./out"
