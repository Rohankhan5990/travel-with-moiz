# Cloudflare Workers — static assets from Next.js export (`output: "export"` → ./out)
#
# This site is a static export, NOT OpenNext. Wrangler 4.68+ autoconfig detects
# Next.js and runs `opennextjs-cloudflare build` unless disabled.
#
# Workers Builds (Cloudflare dashboard → Settings → Build):
#   Build command:  npm run build
#   Deploy command: npm run deploy
# (or: npx wrangler deploy --x-autoconfig=false after npm run build)
#
# Local / CI deploy:
#   npm run deploy
#
# Workers assets: max 25 MiB per file.
# Kashmir review uses public/reviews-videos/kashmir-keran-tour.mp4 — create it with:
#   npm run compress:kashmir-review
# (reads Kashmir Keran Tour..mp4 by default). Or host the full-quality file on R2 and set:
#   NEXT_PUBLIC_REVIEW_VIDEO_KASHMIR_KERAN_URL=https://…/kashmir.mp4
# `generate-video-reviews-manifest.mjs` runs before build; prepare-cf-deploy.mjs
# strips any oversize file left in out/.
#
# If you switch to Cloudflare Pages instead, use:
#   npx wrangler pages deploy
# and you can set pages_build_output_dir = "./out" again.

name = "travel-with-moiz"
compatibility_date = "2025-05-01"

[assets]
directory = "./out"
not_found_handling = "404-page"
